<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Study Platform Pro</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(270deg, #0f2027, #203a43, #2c5364);
  background-size: 600% 600%;
  animation: bgMove 12s ease infinite;
  color: white;
}

@keyframes bgMove {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

header {
  text-align: center;
  padding: 60px 20px;
}

header h1 {
  font-size: 40px;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  border-radius: 15px;
  width: 260px;
  overflow: hidden;
  transition: 0.4s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-10px) scale(1.05);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

button {
  padding: 10px;
  border: none;
  background: #00c6ff;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.details {
  display: none;
  padding: 30px;
  text-align: center;
}

.contact {
  text-align: center;
  padding: 50px;
}

input, textarea {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 260px;
  border-radius: 8px;
  border: none;
}

footer {
  text-align: center;
  padding: 20px;
  opacity: 0.7;
}
</style>

</head>

<body>

<header>
  <h1>🎓 Study Platform</h1>
  <p>Discover Universities in Morocco & USA</p>
</header>

<section class="cards">

  <div class="card" onclick="showDetails('um5')">
    <img src="https://source.unsplash.com/400x250/?university,morocco">
    <div class="card-content">
      <h3>Mohammed V University</h3>
      <p>📍 Rabat - Free</p>
    </div>
  </div>

  <div class="card" onclick="showDetails('harvard')">
    <img src="https://source.unsplash.com/400x250/?harvard,usa">
    <div class="card-content">
      <h3>Harvard University</h3>
      <p>📍 USA - Private</p>
    </div>
  </div>

</section>

<section id="details" class="details"></section>

<section class="contact">
  <h2>📞 Contact Us</h2>
  <p>Phone: 0709388607</p>
  <p>Email: bouhdidaothmane14@gmail.com</p>

  <input type="text" placeholder="Your Name">
  <input type="email" placeholder="Your Email">
  <textarea placeholder="Message"></textarea>
  <button>Send</button>
</section>

<footer>
  <p>© 2026 Study Platform</p>
</footer>

<script>
function showDetails(id) {
  const details = document.getElementById("details");
  details.style.display = "block";

  if(id === "um5") {
    details.innerHTML = `
      <h2>Mohammed V University</h2>
      <p>Located in Rabat, Morocco.</p>
      <p>Public university with multiple faculties.</p>
      <p>Offers degrees in science, law, economics and more.</p>
    `;
  }

  if(id === "harvard") {
    details.innerHTML = `
      <h2>Harvard University</h2>
      <p>Located in the USA.</p>
      <p>One of the top universities in the world.</p>
      <p>Offers a wide range of programs and research opportunities.</p>
    `;
  }

  window.scrollTo({
    top: details.offsetTop,
    behavior: "smooth"
  });
}
</script>

</body>
</html>
