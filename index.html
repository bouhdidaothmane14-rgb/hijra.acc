<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Study Platform Pro Max</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
  background:linear-gradient(270deg,#0f2027,#203a43,#2c5364);
  background-size:600% 600%;
  animation:bgMove 12s infinite;
  color:white;
}
@keyframes bgMove{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

header{
  text-align:center;
  padding:60px 20px;
}
header h1{font-size:45px}
header p{opacity:.8}

.search{
  text-align:center;
  margin:20px;
}
.search input{
  padding:12px;
  width:300px;
  border:none;
  border-radius:10px;
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.card{
  width:280px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(12px);
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
  transition:.4s;
}
.card:hover{transform:scale(1.05)}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
}
.card .content{padding:15px}

.details{
  display:none;
  padding:40px;
  animation:fade .5s;
}
@keyframes fade{from{opacity:0}to{opacity:1}}

.map{
  width:100%;
  height:300px;
  margin-top:20px;
  border-radius:15px;
  border:none;
}

.contact{
  text-align:center;
  padding:50px;
}
input,textarea{
  display:block;
  margin:10px auto;
  padding:10px;
  width:260px;
  border:none;
  border-radius:8px;
}

button{
  padding:10px 20px;
  border:none;
  background:#00c6ff;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

footer{text-align:center;padding:20px;opacity:.7}
</style>
</head>

<body>

<header>
  <h1>🎓 Study Platform</h1>
  <p>Explore Universities (Morocco & USA)</p>
</header>

<div class="search">
  <input type="text" placeholder="Search university..." onkeyup="searchUni(this.value)">
</div>

<div class="container" id="cards"></div>

<div id="details" class="details"></div>

<section class="contact">
  <h2>📞 Contact</h2>
  <p>0709388607</p>
  <p>bouhdidaothmane14@gmail.com</p>

  <input placeholder="Name">
  <input placeholder="Email">
  <textarea placeholder="Message"></textarea>
  <button>Send</button>
</section>

<footer>© 2026 Study Platform</footer>

<script>
const universities = [
  {
    name:"Mohammed V University",
    country:"Morocco",
    type:"Public",
    location:"Rabat",
    img:"https://source.unsplash.com/400x250/?morocco,university",
    map:"https://maps.google.com/maps?q=rabat&t=&z=13&ie=UTF8&iwloc=&output=embed",
    desc:"Top public university in Morocco with many faculties."
  },
  {
    name:"Hassan II University",
    country:"Morocco",
    type:"Public",
    location:"Casablanca",
    img:"https://source.unsplash.com/400x250/?casablanca,university",
    map:"https://maps.google.com/maps?q=casablanca&t=&z=13&output=embed",
    desc:"Major university in Casablanca."
  },
  {
    name:"Harvard University",
    country:"USA",
    type:"Private",
    location:"Massachusetts",
    img:"https://source.unsplash.com/400x250/?harvard",
    map:"https://maps.google.com/maps?q=harvard&t=&z=13&output=embed",
    desc:"One of the best universities in the world."
  },
  {
    name:"Stanford University",
    country:"USA",
    type:"Private",
    location:"California",
    img:"https://source.unsplash.com/400x250/?stanford",
    map:"https://maps.google.com/maps?q=stanford&t=&z=13&output=embed",
    desc:"Top tech and research university."
  }
];

function display(list){
  const container=document.getElementById("cards");
  container.innerHTML="";
  list.forEach((u,i)=>{
    container.innerHTML+=`
    <div class="card" onclick="show(${i})">
      <img src="${u.img}">
      <div class="content">
        <h3>${u.name}</h3>
        <p>${u.location} - ${u.type}</p>
      </div>
    </div>`;
  });
}

function show(i){
  const u=universities[i];
  const d=document.getElementById("details");
  d.style.display="block";
  d.innerHTML=`
    <h2>${u.name}</h2>
    <p>${u.desc}</p>
    <p>${u.location} - ${u.country}</p>
    <iframe class="map" src="${u.map}"></iframe>
  `;
  window.scrollTo({top:d.offsetTop,behavior:"smooth"});
}

function searchUni(val){
  const filtered=universities.filter(u=>u.name.toLowerCase().includes(val.toLowerCase()));
  display(filtered);
}

display(universities);
</script>

</body>
</html>
