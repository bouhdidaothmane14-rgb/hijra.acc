    <style>
        :root {
            /* Brand Colors - Exact spec */
            --morocco-red: #c1272d;
            --morocco-green: #006233;
            --deep-navy: #0f172a;
            --off-white: #f8fafc;
            --white: #ffffff;
            --light-blue: #e0f2fe;
            --gold: #f59e0b;
            
            /* Semantic Colors */
            --primary: var(--morocco-red);
            --secondary: var(--morocco-green);
            --text-primary: var(--deep-navy);
            --text-secondary: #475569;
            --bg-primary: var(--off-white);
            --bg-secondary: #f1f5f9;
            
            /* Typography Scale */
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --h1: clamp(3.5rem, 8vw, 6rem);
            --h2: clamp(2.5rem, 6vw, 4rem);
            --h3: clamp(1.75rem, 4vw, 2.5rem);
            --h4: 1.25rem;
            --body: clamp(1rem, 2.5vw, 1.125rem);
            --small: 0.875rem;
            
            /* Spacing System (8pt grid) */
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;
            --space-12: 3rem;
            --space-14: 3.5rem;
            --space-16: 4rem;
            --space-20: 5rem;
            --space-24: 6rem;
            
            /* Shadows - Subtle 3D */
            --shadow-xs: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --shadow-2xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            
            /* Border Radius */
            --radius-sm: 0.5rem;
            --radius-md: 0.75rem;
            --radius-lg: 1.5rem;
            --radius-xl: 2rem;
            
            /* Z-index */
            --z-nav: 40;
            --z-modal: 50;
            --z-dropdown: 60;
        }

        /* Base Reset & Typography */
        *, *::before, *::after { 
            box-sizing: border-box; 
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: env(safe-area-inset-top);
            -webkit-text-size-adjust: 100%;
        }

        body {
            margin: 0;
            font-family: var(--font-family);
            font-size: var(--body);
            line-height: 1.65;
            color: var(--text-primary);
            background: var(--bg-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Semantic Container */
        .container {
            width: 100%;
            margin: 0 auto;
            padding-left: clamp(var(--space-6), 4vw, var(--space-10));
            padding-right: clamp(var(--space-6), 4vw, var(--space-10));
            max-width: 1400px;
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: var(--space-6);
        }

        h1 { font-size: var(--h1); }
        h2 { font-size: var(--h2); }
        h3 { font-size: var(--h3); }
        h4 { font-size: var(--h4); font-weight: 700; }

        p { margin-bottom: var(--space-6); }

        /* Links */
        a {
            color: var(--primary);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        a:hover { color: var(--morocco-red); }

        /* Buttons - Professional 3D */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-6) var(--space-8);
            font-size: 1.125rem;
            font-weight: 600;
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(10px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--morocco-red), #a81c22);
            color: var(--white);
        }

        .btn-primary:hover {
            transform: translateY(-0.25rem) rotateX(8deg);
            box-shadow: var(--shadow-2xl);
        }

        .btn-secondary {
            background: var(--white);
            color: var(--text-primary);
            border: 2px solid transparent;
        }

        .btn-secondary:hover {
            background: #f8fafc;
            border-color: var(--primary);
            transform: translateY(-0.25rem);
            box-shadow: var(--shadow-xl);
        }

        /* Hero Section - Production Ready */
        .hero {
            min-height: 100vh;
            max-height: 100vh;
            background: linear-gradient(135deg, var(--deep-navy) 0%, #1e293b 50%, var(--deep-navy) 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--white);
            overflow: hidden;
        }

        .hero::before,
        .hero::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, 
                rgba(193,39,45,0.15) 0%, 
                rgba(193,39,45,0.08) 30%, 
                transparent 70%);
            animation: heroGlow 8s ease-in-out infinite alternate;
            will-change: transform, opacity;
        }

        .hero::before {
            top: 15%;
            left: 5%;
            width: 500px;
            height: 500px;
            animation-delay: -2s;
        }

        .hero::after {
            bottom: 20%;
            right: 10%;
            width: 350px;
            height: 350px;
            animation-delay: -5s;
        }

        @keyframes heroGlow {
            0% { 
                transform: scale(1) rotate(0deg); 
                opacity: 0.4; 
            }
            100% { 
                transform: scale(1.3) rotate(120deg); 
                opacity: 0.15; 
            }
        }

        .hero-content {
            max-width: 900px;
            padding: var(--space-12);
            transform: translateZ(0);
        }

        .hero-content h1 {
            font-size: var(--h1);
            font-weight: 900;
            margin-bottom: var(--space-8);
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, var(--white), #f1f5f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 4px 20px rgba(255,255,255,0.3);
        }

        .hero-content h2 {
            font-size: clamp(1.5rem, 4vw, 2.25rem);
            font-weight: 600;
            margin-bottom: var(--space-12);
            opacity: 0.95;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-buttons {
            display: flex;
            gap: var(--space-8);
            justify-content: center;
            flex-wrap: wrap;
            margin-top: var(--space-8);
        }

        /* Study Abroad Section */
        .study-abroad {
            background: linear-gradient(135deg, var(--off-white) 0%, var(--light-blue) 100%);
            padding: var(--space-20) 0;
            position: relative;
            overflow: hidden;
        }

        .section-header {
            text-align: center;
            margin-bottom: var(--space-12);
        }

        .section-header h2 {
            font-size: var(--h2);
            font-weight: 900;
            margin-bottom: var(--space-6);
            background: linear-gradient(135deg, var(--morocco-red), var(--morocco-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-header p {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 800px;
            margin: 0 auto;
            font-weight: 500;
        }

        /* Cards Grid - Professional Layout */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: var(--space-10);
            margin-top: var(--space-10);
        }

        .card {
            background: var(--white);
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            position: relative;
            height: 640px;
            display: flex;
            flex-direction: column;
            transform: translateZ(0);
            will-change: transform;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--morocco-red), var(--morocco-green));
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:hover {
            transform: translateY(-1.25rem) translateZ(20px) rotateX(3deg) rotateY(1deg);
            box-shadow: var(--shadow-2xl);
        }

        .card-image {
            height: 280px;
            position: relative;
            overflow: hidden;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .card:hover .card-image img {
            transform: scale(1.08) rotate(0.5deg);
        }

        .badge {
            position: absolute;
            top: var(--space-6);
            right: var(--space-6);
            padding: var(--space-3) var(--space-5);
            border-radius: var(--radius-md);
            font-size: var(--small);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-md);
        }

        .badge-usa { 
            background: rgba(15, 23, 42, 0.95);
            color: var(--white);
        }

        .badge-uk { 
            background: rgba(30, 64, 175, 0.95);
            color: var(--white);
        }

        .badge-process { 
            background: rgba(245, 158, 11, 0.95);
            color: var(--deep-navy);
        }

        .card-title {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            color: var(--white);
            padding: var(--space-10) var(--space-8) var(--space-6);
            font-size: 1.75rem;
            font-weight: 900;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        .card-content {
            padding: var(--space-10);

            gap: var(--space-6);
        }

        .schools-list {

            gap: var(--space-4);
            font-size: 0.95rem;
        }

        .schools-list h4 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: var(--space-3);
            color: var(--text-primary);
        }

        .school-item {
            font-weight: 600;
            color: var(--text-secondary);
            padding: var(--space-1) 0;
        }

        .requirements {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            padding: var(--space-8);
            border-radius: var(--radius-lg);
            border-left: 4px solid var(--morocco-green);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }

        .requirements h4 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: var(--space-4);
            color: var(--morocco-green);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .requirement-item {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            margin-bottom: var(--space-2);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .requirement-item i {
            color: var(--morocco-green);
            width: 18px;
            font-size: 0.875rem;
        }

        .deadline {
            background: linear-gradient(135deg, var(--morocco-red), #a81c22);
            color: var(--white);
            padding: var(--space-8);
            border-radius: var(--radius-lg);
            text-align: center;
            font-weight: 800;
            font-size: 1.125rem;
            margin-top: auto;
            box-shadow: var(--shadow-lg);
            letter-spacing: 0.025em;
        }

        .timeline {
            display: flex;
            flex-direction: column;
            gap: var(--space-6);
        }

        .timeline-item {
            position: relative;
            padding-left: var(--space-10);
            padding-top: var(--space-4);
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 16px;
            top: 8px;
            bottom: -24px;
            width: 2px;
            background: linear-gradient(to bottom, #e2e8f0, transparent);
        }

        .timeline-item:last-child::before {
            display: none;
        }

        .timeline-item::after {
            content: '';

            border: 4px solid var(--white);
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.4);
        }
